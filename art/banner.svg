<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#0d2137"/>
      <stop offset="100%" style="stop-color:#112d4e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#36b37e"/>
      <stop offset="100%" style="stop-color:#57d9a3"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#36b37e"/>
      <stop offset="100%" style="stop-color:#00875a"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#57d9a3;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#36b37e;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Decorative credit card icon (left) -->
  <g transform="translate(120, 200)" opacity="0.07">
    <rect x="0" y="0" width="240" height="160" rx="16" fill="#ffffff"/>
    <rect x="0" y="40" width="240" height="35" fill="#ffffff" opacity="0.5"/>
    <rect x="20" y="55" width="50" height="10" rx="3" fill="#0a1628"/>
    <rect x="20" y="100" width="200" height="8" rx="4" fill="#0a1628"/>
    <rect x="20" y="120" width="80" height="6" rx="3" fill="#0a1628"/>
    <rect x="170" y="115" width="50" height="30" rx="6" fill="#0a1628"/>
    <circle cx="185" cy="130" r="12" fill="#0a1628" opacity="0.6"/>
    <circle cx="205" cy="130" r="12" fill="#0a1628" opacity="0.4"/>
  </g>

  <!-- Decorative shield icon (right) -->
  <g transform="translate(960, 180)" opacity="0.06">
    <path d="M100,20 C100,20 40,40 40,40 L40,120 C40,170 100,210 100,210 C100,210 160,170 160,120 L160,40 Z" fill="#ffffff" stroke="none"/>
    <path d="M100,70 L85,100 L100,95 L115,100 Z" fill="#0a1628" opacity="0.5"/>
    <polyline points="80,110 95,130 125,90" fill="none" stroke="#0a1628" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>

  <!-- Decorative payment flow arrows -->
  <g opacity="0.04" stroke="#36b37e" stroke-width="2" fill="none">
    <path d="M200,450 C300,450 350,400 450,400"/>
    <path d="M450,400 C550,400 600,450 700,450"/>
    <path d="M700,450 C800,450 850,400 950,400"/>
    <path d="M950,400 C1050,400 1100,450 1150,450"/>
    <circle cx="200" cy="450" r="4" fill="#36b37e"/>
    <circle cx="450" cy="400" r="4" fill="#36b37e"/>
    <circle cx="700" cy="450" r="4" fill="#36b37e"/>
    <circle cx="950" cy="400" r="4" fill="#36b37e"/>
    <circle cx="1150" cy="450" r="4" fill="#36b37e"/>
  </g>

  <!-- Accent line -->
  <rect x="440" y="200" width="80" height="4" rx="2" fill="url(#accent)"/>

  <!-- Package name -->
  <text x="640" y="270" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-2">
    netipar/simplepay
  </text>

  <!-- Tagline -->
  <text x="640" y="330" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" fill="#8899aa" letter-spacing="1">
    Modern Laravel package for SimplePay online payments
  </text>

  <!-- Feature pills -->
  <g transform="translate(640, 385)" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="500">
    <!-- Payments -->
    <rect x="-370" y="-16" width="110" height="32" rx="16" fill="#36b37e" fill-opacity="0.15" stroke="#36b37e" stroke-opacity="0.3" stroke-width="1"/>
    <text x="-315" y="5" fill="#57d9a3">Payments</text>

    <!-- Card Storage -->
    <rect x="-240" y="-16" width="130" height="32" rx="16" fill="#36b37e" fill-opacity="0.15" stroke="#36b37e" stroke-opacity="0.3" stroke-width="1"/>
    <text x="-175" y="5" fill="#57d9a3">Card Storage</text>

    <!-- Recurring -->
    <rect x="-90" y="-16" width="110" height="32" rx="16" fill="#36b37e" fill-opacity="0.15" stroke="#36b37e" stroke-opacity="0.3" stroke-width="1"/>
    <text x="-35" y="5" fill="#57d9a3">Recurring</text>

    <!-- Apple Pay -->
    <rect x="40" y="-16" width="114" height="32" rx="16" fill="#36b37e" fill-opacity="0.15" stroke="#36b37e" stroke-opacity="0.3" stroke-width="1"/>
    <text x="97" y="5" fill="#57d9a3">Apple Pay</text>

    <!-- Webhooks -->
    <rect x="174" y="-16" width="114" height="32" rx="16" fill="#36b37e" fill-opacity="0.15" stroke="#36b37e" stroke-opacity="0.3" stroke-width="1"/>
    <text x="231" y="5" fill="#57d9a3">Webhooks</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="630" width="1280" height="10" fill="url(#accent)"/>

  <!-- NETipar text branding -->
  <g transform="translate(640, 460)" text-anchor="middle" opacity="0.3">
    <text x="0" y="0" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#ffffff" letter-spacing="3">
      NETipar
    </text>
  </g>

  <!-- SDK version badge -->
  <g transform="translate(640, 500)" text-anchor="middle" opacity="0.2">
    <text x="0" y="0" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#ffffff" letter-spacing="1">
      SimplePay SDK v2.1
    </text>
  </g>
</svg>
